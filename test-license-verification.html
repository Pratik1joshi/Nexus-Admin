<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test License Verification - Firebase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            margin-top: 15px;
        }
        .info-label {
            font-weight: 600;
        }
        .sample-keys {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .sample-keys h3 {
            margin-top: 0;
            color: #667eea;
        }
        .key-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        .key-button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Firebase License Verification Test</h1>
        
        <div class="sample-keys">
            <h3>Sample License Keys (from Firebase):</h3>
            <button class="key-button" onclick="useLicense('POS-2025-mfVcRHm3-S4ESDZD8')">The Wild Stars</button>
            <button class="key-button" onclick="useLicense('POS-2025-jNgCL083-FKD5XOOQ')">Spice Garden</button>
            <button class="key-button" onclick="useLicense('POS-2025-EXOIOeZ3-YWLMO7WS')">Ocean View Cafe</button>
        </div>

        <div class="form-group">
            <label for="serverUrl">Admin Server URL:</label>
            <input type="text" id="serverUrl" value="http://localhost:3001" placeholder="http://localhost:3001">
        </div>

        <div class="form-group">
            <label for="licenseKey">License Key:</label>
            <input type="text" id="licenseKey" placeholder="POS-2025-XXXXX-XXXXXXXX">
        </div>

        <button onclick="verifyLicense()" id="verifyBtn">🔍 Verify License</button>

        <div id="result"></div>
    </div>

    <script>
        function useLicense(key) {
            document.getElementById('licenseKey').value = key;
        }

        async function verifyLicense() {
            const serverUrl = document.getElementById('serverUrl').value;
            const licenseKey = document.getElementById('licenseKey').value;
            const resultDiv = document.getElementById('result');
            const button = document.getElementById('verifyBtn');

            if (!licenseKey) {
                alert('Please enter a license key');
                return;
            }

            button.disabled = true;
            button.textContent = '⏳ Verifying...';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`${serverUrl}/api/verify-license`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ license_key: licenseKey })
                });

                const data = await response.json();

                resultDiv.style.display = 'block';

                if (data.valid) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h3>✅ License Valid!</h3>
                        <div class="info-grid">
                            <div class="info-label">Status:</div>
                            <div>${data.status}</div>
                            
                            <div class="info-label">Restaurant Name:</div>
                            <div>${data.restaurant.name}</div>
                            
                            <div class="info-label">Location:</div>
                            <div>${data.restaurant.location}</div>
                            
                            <div class="info-label">Contact:</div>
                            <div>${data.restaurant.contact_number}</div>
                            
                            <div class="info-label">Email:</div>
                            <div>${data.restaurant.contact_email}</div>
                            
                            <div class="info-label">Owner:</div>
                            <div>${data.restaurant.owner_name}</div>
                            
                            <div class="info-label">Plan Type:</div>
                            <div>${data.plan_type}</div>
                            
                            <div class="info-label">Days Remaining:</div>
                            <div>${data.days_remaining} days</div>
                            
                            <div class="info-label">Expiry Date:</div>
                            <div>${new Date(data.expiry_date).toLocaleDateString()}</div>
                        </div>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        <h3>❌ License Invalid</h3>
                        <p><strong>Error:</strong> ${data.error}</p>
                        ${data.details ? `<p><small>${data.details}</small></p>` : ''}
                    `;
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3>❌ Connection Error</h3>
                    <p>${error.message}</p>
                    <p><small>Make sure the admin server is running on ${serverUrl}</small></p>
                `;
            } finally {
                button.disabled = false;
                button.textContent = '🔍 Verify License';
            }
        }

        // Allow Enter key to submit
        document.getElementById('licenseKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyLicense();
        });
    </script>
</body>
</html>
